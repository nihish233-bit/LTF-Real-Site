<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTF - Geri Bildirim & Puanlama</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --siyah: #0A0A0F;
            --siyah-2: #1A1A20;
            --altin: #FFD700;
            --kirmizi: #8B0000;
            --beyaz: #FFFFFF;
            --mavi: #87CEEB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--siyah);
            color: var(--beyaz);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes slowDrift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 215, 0, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(139, 0, 0, 0.03) 0%, transparent 40%);
            animation: slowDrift 35s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes starGlow {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 8px var(--altin); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-up { animation: fadeInUp 0.6s ease forwards; }
        .scale-in { animation: scaleIn 0.5s ease forwards; }

        /* HAMBURGER MENU */
        .hamburger {
            width: 40px;
            height: 30px;
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            padding: 5px;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background: var(--altin);
            border-radius: 3px;
            transition: 0.3s;
        }

        .hamburger.open .bar1 {
            transform: translateY(12px) rotate(45deg);
            background: var(--mavi);
        }

        .hamburger.open .bar2 {
            opacity: 0;
        }

        .hamburger.open .bar3 {
            transform: translateY(-12px) rotate(-45deg);
            background: var(--mavi);
        }

        /* SIDE MENU */
        .side-menu {
            width: 260px;
            height: 100vh;
            background: var(--siyah-2);
            position: fixed;
            top: 0;
            left: -280px;
            z-index: 99;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 80px 0 30px;
            border-right: 2px solid var(--altin);
        }

        .side-menu.open {
            left: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            color: var(--beyaz);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-link i {
            width: 20px;
            color: var(--altin);
        }

        .menu-link:hover {
            background: rgba(255, 215, 0, 0.1);
            border-left-color: var(--altin);
        }

        .menu-link.active {
            background: rgba(255, 215, 0, 0.15);
            border-left-color: var(--altin);
            color: var(--altin);
        }

        .menu-footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Ana İçerik */
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 80px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--altin), var(--altin));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: var(--beyaz);
            opacity: 0.8;
        }

        .rating-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--siyah-2);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--altin);
        }

        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h2 i {
            color: var(--altin);
        }

        /* Kullanıcı Bilgi Alanı */
        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .avatar-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .avatar-option {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--siyah);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .avatar-option:hover {
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: var(--altin);
            background: rgba(255, 215, 0, 0.2);
        }

        .username-input {
            flex: 1;
            background: var(--siyah);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 12px 18px;
            color: var(--beyaz);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .username-input:focus {
            outline: none;
            border-color: var(--altin);
        }

        .stars {
            display: flex;
            gap: 8px;
            cursor: pointer;
            margin: 15px 0;
        }

        .star {
            font-size: 2.2rem;
            color: #444;
            transition: all 0.15s;
            cursor: pointer;
        }

        .star:hover {
            transform: scale(1.1);
        }

        .star.active {
            color: var(--altin);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .rating-value {
            font-size: 1rem;
            opacity: 0.7;
            margin-left: 15px;
        }

        textarea {
            width: 100%;
            background: var(--siyah);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--beyaz);
            font-family: 'Inter', sans-serif;
            resize: vertical;
            margin-top: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--altin);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--altin), #e6c300);
            color: var(--siyah);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .average-card {
            background: linear-gradient(135deg, var(--kirmizi), #5a0000);
            border: none;
        }

        .average-score {
            text-align: center;
            padding: 20px 0;
        }

        .big-score {
            font-size: 5rem;
            font-weight: 800;
            color: var(--altin);
            line-height: 1;
        }

        .total-votes {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 10px 0;
        }

        .star-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }

        .star-display i {
            font-size: 2rem;
            color: #444;
        }

        .star-display i.filled {
            color: var(--altin);
        }

        .feedback-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .feedback-item {
            background: rgba(10, 10, 15, 0.6);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 3px solid var(--altin);
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .feedback-avatar {
            width: 45px;
            height: 45px;
            background: var(--siyah);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .feedback-content {
            flex: 1;
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .feedback-user {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .feedback-name {
            font-weight: 600;
            color: var(--altin);
        }

        .feedback-stars {
            color: var(--altin);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .feedback-date {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .feedback-text {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
            word-break: break-word;
        }

        .empty-feedback {
            text-align: center;
            opacity: 0.5;
            padding: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--siyah);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--siyah-2);
            border-left: 4px solid var(--altin);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .star { font-size: 1.6rem; }
            .big-score { font-size: 3.5rem; }
            .toast { bottom: 20px; right: 20px; left: 20px; transform: translateY(100px); }
            .toast.show { transform: translateY(0); }
            .feedback-item { flex-direction: column; }
            .feedback-avatar { align-self: center; }
        }
    </style>
</head>
<body>

        <span class="bar1"></span>

    </div>

    <div class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>Geri Bildirim & Puanlama</h1>
                <p>Deneyiminizi paylaşın, topluluğumuzu geliştirin</p>
            </div>

            <div class="rating-grid">
                <div class="card">
                    <h2><i class="fas fa-star"></i> Senin Puanın</h2>
                    
                    <!-- KULLANICI BİLGİ ALANI -->
                    <div class="user-info">
                        <div class="avatar-selector" id="avatarSelector">
                            <div class="avatar-option" data-avatar="😎">😎</div>
                            <div class="avatar-option" data-avatar="👨‍💻">👨‍💻</div>
                            <div class="avatar-option" data-avatar="🎮">🎮</div>
                            <div class="avatar-option" data-avatar="🔥">🔥</div>
                            <div class="avatar-option" data-avatar="⭐">⭐</div>
                            <div class="avatar-option" data-avatar="🚀">🚀</div>
                            <div class="avatar-option" data-avatar="🐱">🐱</div>
                            <div class="avatar-option" data-avatar="🎧">🎧</div>

                        <input type="text" class="username-input" id="usernameInput" placeholder="Kullanıcı adınız (zorunlu)" maxlength="25">
                    </div>
                    
                    <div class="stars" id="ratingStars">
                        <i class="far fa-star star" data-value="1"></i>
                        <i class="far fa-star star" data-value="2"></i>
                        <i class="far fa-star star" data-value="3"></i>
                        <i class="far fa-star star" data-value="4"></i>
                        <i class="far fa-star star" data-value="5"></i>
                    </div>
                    <span id="selectedRatingText" class="rating-value">Puan seçilmedi</span>
                    
                    <textarea id="feedbackText" rows="3" placeholder="Geri bildiriminizi yazın... (isteğe bağlı)"></textarea>
                    
                    <button class="btn-submit" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Gönder
                    </button>
                </div>

                <div class="card average-card">
                    <h2><i class="fas fa-chart-line"></i> Ortalama Puan</h2>
                    <div class="average-score">
                        <div class="big-score" id="averageScore">0.00</div>
                        <div class="total-votes" id="totalVotes">Yükleniyor...</div>
                        <div class="star-display" id="averageStars">
                            <i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-comments"></i> Son Geri Bildirimler</h2>
                <div id="feedbackList" class="feedback-list">
                    <div class="empty-feedback"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

    <script>
        // ========== FIREBASE KONFIGÜRASYONU ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDAi_IqftZcuMmgvjIHlZXlC0hV2KmZA78",
            authDomain: "ltf-puanlama-9a139.firebaseapp.com",
            projectId: "ltf-puanlama-9a139",
            storageBucket: "ltf-puanlama-9a139.firebasestorage.app",
            messagingSenderId: "158627242883",
            appId: "1:158627242883:web:09aa2caff119ae9ebc0cb6",
            measurementId: "G-T1C2ZFV4MC",
            databaseURL: "https://ltf-puanlama-9a139-default-rtdb.firebaseio.com"
        };
        
        // Firebase başlat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Global değişkenler
        let currentRating = 0;
        let isSubmitting = false;
        let selectedAvatar = "😎";
        let username = "";
        
        const stars = document.querySelectorAll('.star');
        const selectedRatingText = document.getElementById('selectedRatingText');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackTextarea = document.getElementById('feedbackText');
        const usernameInput = document.getElementById('usernameInput');
        
        // Avatar seçimi
        const avatarOptions = document.querySelectorAll('.avatar-option');
        avatarOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                avatarOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedAvatar = opt.dataset.avatar;
            });
        });
        // İlk avatarları seçili yap
        avatarOptions[0].classList.add('selected');
        
        // Yıldız işlemleri
        stars.forEach(star => {
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                highlightStars(value);
            });
            star.addEventListener('mouseleave', function() {
                highlightStars(currentRating);
            });
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.value);
                highlightStars(currentRating);
                selectedRatingText.textContent = `${currentRating} / 5 yıldız`;
                this.style.animation = 'starGlow 0.3s ease';
                setTimeout(() => this.style.animation = '', 300);
            });
        });
        
        function highlightStars(rating) {
            stars.forEach(star => {
                const value = parseInt(star.dataset.value);
                if (value <= rating) {
                    star.className = 'fas fa-star star active';
                } else {
                    star.className = 'far fa-star star';
                }
            });
        }
        
        // Firebase'den veri oku
        function loadData() {
            const ratingsRef = database.ref('ratings');
            const feedbacksRef = database.ref('feedbacks');
            
            ratingsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && typeof data === 'object') {
                    const ratingsArray = Object.values(data);
                    if (ratingsArray.length > 0) {
                        const validRatings = ratingsArray.filter(r => typeof r === 'number' || (r && typeof r.rating === 'number'));
                        const numbers = validRatings.map(r => typeof r === 'number' ? r : r.rating);
                        updateAverageScore(numbers);
                    } else {
                        updateAverageScore([]);
                    }
                } else {
                    updateAverageScore([]);
                }
            });
            
            feedbacksRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && typeof data === 'object') {
                    const feedbacksArray = Object.values(data);
                    feedbacksArray.sort((a, b) => b.timestamp - a.timestamp);
                    updateFeedbackList(feedbacksArray);
                } else {
                    updateFeedbackList([]);
                }
            });
        }
        
        function updateAverageScore(ratingsArray) {
            const avgScoreEl = document.getElementById('averageScore');
            const totalVotesEl = document.getElementById('totalVotes');
            const avgStarsEl = document.getElementById('averageStars');
            
            if (!ratingsArray || ratingsArray.length === 0) {
                avgScoreEl.textContent = '0.00';
                totalVotesEl.textContent = '0 kişi puanladı';
                avgStarsEl.innerHTML = '<i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>';
                return;
            }
            
            const sum = ratingsArray.reduce((a, b) => a + b, 0);
            const avg = sum / ratingsArray.length;
            avgScoreEl.textContent = avg.toFixed(2);
            totalVotesEl.textContent = `${ratingsArray.length} kişi puanladı`;
            
            const fullStars = Math.round(avg);
            avgStarsEl.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStars) {
                    avgStarsEl.innerHTML += '<i class="fas fa-star filled"></i>';
                } else {
                    avgStarsEl.innerHTML += '<i class="far fa-star"></i>';
                }
            }
        }
        
        function updateFeedbackList(feedbacksArray) {
            const feedbackListDiv = document.getElementById('feedbackList');
            
            if (!feedbacksArray || feedbacksArray.length === 0) {
                feedbackListDiv.innerHTML = '<div class="empty-feedback"><i class="fas fa-inbox"></i> Henüz geri bildirim yok. İlk sen paylaş!</div>';
                return;
            }
            
            const recent = feedbacksArray.slice(0, 15);
            feedbackListDiv.innerHTML = recent.map(fb => `
                <div class="feedback-item">
                    <div class="feedback-avatar">${fb.avatar || '😎'}</div>
                    <div class="feedback-content">
                        <div class="feedback-header">
                            <div class="feedback-user">
                                <span class="feedback-name">${escapeHtml(fb.username || 'Anonim')}</span>
                                <div class="feedback-stars">${'★'.repeat(fb.rating)}${'☆'.repeat(5 - fb.rating)}</div>
                            </div>
                            <div class="feedback-date">${fb.date}</div>
                        </div>
                        <div class="feedback-text">${escapeHtml(fb.text || 'Geri bildirim yazılmamış')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            icon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.style.borderLeftColor = isError ? 'var(--kirmizi)' : 'var(--altin)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Firebase'e gönder
        async function submitToFirebase(rating, feedbackText, username, avatar) {
            const now = new Date();
            const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const id = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            const feedbackData = { 
                rating, 
                text: feedbackText || '', 
                date: dateStr, 
                timestamp: now.getTime(),
                username: username,
                avatar: avatar
            };
            
            const ratingData = { rating, timestamp: now.getTime() };
            
            try {
                await database.ref('feedbacks/' + id).set(feedbackData);
                await database.ref('ratings/' + id).set(ratingData);
                return true;
            } catch (error) {
                console.error('Firebase hatası:', error);
                return false;
            }
        }
        
        // Gönder butonu
        submitBtn.addEventListener('click', async () => {
            if (isSubmitting) return;
            
            username = usernameInput.value.trim();
            if (username === "") {
                showToast('Lütfen kullanıcı adınızı girin!', true);
                usernameInput.style.animation = 'shake 0.4s ease';
                setTimeout(() => usernameInput.style.animation = '', 400);
                return;
            }
            
            if (currentRating === 0) {
                showToast('Lütfen bir puan seçin!', true);
                document.querySelector('.stars').style.animation = 'shake 0.4s ease';
                setTimeout(() => document.querySelector('.stars').style.animation = '', 400);
                return;
            }
            
            isSubmitting = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Gönderiliyor...';
            submitBtn.disabled = true;
            
            const success = await submitToFirebase(currentRating, feedbackTextarea.value.trim(), username, selectedAvatar);
            
            if (success) {
                showToast('Geri bildiriminiz için teşekkürler! 🎉');
                currentRating = 0;
                highlightStars(0);
                selectedRatingText.textContent = 'Puan seçilmedi';
                feedbackTextarea.value = '';
                // username'i temizleme, bir sonraki için kalabilir
            } else {
                showToast('Bir hata oluştu. Lütfen tekrar deneyin.', true);
            }
            
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Gönder';
            submitBtn.disabled = false;
            isSubmitting = false;
        });
        
        // Hamburger menu
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("sideMenu");
        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            menu.classList.toggle("open");
            btn.classList.toggle("open");
        });
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('open');
                btn.classList.remove('open');
            }
        });
        
        // Başlat
        loadData();
        highlightStars(0);
    </script>
</body>
</html>
